name: Auto Notifications

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch: 

jobs:
  jalankan-notifikasi:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ambil kode dari repository
        uses: actions/checkout@v3

      - name: Siapkan Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Library
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Jalankan Script Email
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python mailsend.py

      - name: Jalankan Script WhatsApp
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          WA_TOKEN: ${{ secrets.WA_TOKEN }}
        run: python wasend.py